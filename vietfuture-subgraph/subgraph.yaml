specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: VoucherProtocol
    network: sepolia
    source:
      address: "0x5081a39b8A5f0E35a8D959395a630b68B74Dd30f"
      abi: VoucherProtocol
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - CoSignOperatorConfigured
        - CoSignPolicyUpdated
        - DocumentAnchored
        - DocumentCoSignQualified
        - DocumentCoSigned
        - DocumentRevoked
        - MinOperatorStakeUpdated
        - NonceConsumed
        - OperatorJoined
        - OperatorMetadataUpdated
        - OperatorRecovered
        - OperatorRecoveryAliasUpdated
        - OperatorRecoveryDelegateUpdated
        - OperatorSlashed
        - OperatorSoftSlashed
        - OperatorStakeToppedUp
        - OperatorStatusUpdated
        - OperatorUnstakeRequested
        - OperatorUnstaked
        - ProtocolInitialized
        - RoleAdminChanged
        - RoleGranted
        - RoleRevoked
        - TenantCreated
        - TenantStatusUpdated
        - TreasuryUpdated
        - UnstakeCooldownUpdated
        - ViolationPenaltyUpdated
      abis:
        - name: VoucherProtocol
          file: ./abis/VoucherProtocol.json
      eventHandlers:
        - event: CoSignOperatorConfigured(indexed bytes32,indexed uint32,indexed address,bool,uint16)
          handler: handleCoSignOperatorConfigured
        - event: CoSignPolicyUpdated(indexed bytes32,indexed uint32,bool,uint256,uint256,uint256)
          handler: handleCoSignPolicyUpdated
        - event: DocumentAnchored(indexed bytes32,indexed bytes32,string,indexed address,bytes32,bytes32,uint32,uint32)
          handler: handleDocumentAnchored
        - event: DocumentCoSignQualified(indexed bytes32,indexed bytes32,uint256,uint256)
          handler: handleDocumentCoSignQualified
        - event: DocumentCoSigned(indexed bytes32,indexed bytes32,indexed address,uint256)
          handler: handleDocumentCoSigned
        - event: DocumentRevoked(indexed bytes32,indexed bytes32,indexed address,string)
          handler: handleDocumentRevoked
        - event: MinOperatorStakeUpdated(indexed bytes32,uint256,uint256)
          handler: handleMinOperatorStakeUpdated
        - event: NonceConsumed(indexed bytes32,indexed address,uint256,uint256)
          handler: handleNonceConsumed
        - event: OperatorJoined(indexed bytes32,indexed address,string,uint256)
          handler: handleOperatorJoined
        - event: OperatorMetadataUpdated(indexed bytes32,indexed address,string)
          handler: handleOperatorMetadataUpdated
        - event: OperatorRecovered(indexed bytes32,indexed address,indexed address,uint256,string)
          handler: handleOperatorRecovered
        - event: OperatorRecoveryAliasUpdated(indexed bytes32,indexed address,indexed address,address)
          handler: handleOperatorRecoveryAliasUpdated
        - event: OperatorRecoveryDelegateUpdated(indexed bytes32,indexed address,indexed address)
          handler: handleOperatorRecoveryDelegateUpdated
        - event: OperatorSlashed(indexed bytes32,indexed address,uint256,indexed address,string)
          handler: handleOperatorSlashed
        - event: OperatorSoftSlashed(indexed bytes32,indexed address,indexed bytes32,uint16,uint256,uint256,address,string)
          handler: handleOperatorSoftSlashed
        - event: OperatorStakeToppedUp(indexed bytes32,indexed address,uint256,uint256)
          handler: handleOperatorStakeToppedUp
        - event: OperatorStatusUpdated(indexed bytes32,indexed address,bool,string)
          handler: handleOperatorStatusUpdated
        - event: OperatorUnstakeRequested(indexed bytes32,indexed address,uint256)
          handler: handleOperatorUnstakeRequested
        - event: OperatorUnstaked(indexed bytes32,indexed address,uint256)
          handler: handleOperatorUnstaked
        - event: ProtocolInitialized(indexed address)
          handler: handleProtocolInitialized
        - event: RoleAdminChanged(indexed bytes32,indexed bytes32,indexed bytes32)
          handler: handleRoleAdminChanged
        - event: RoleGranted(indexed bytes32,indexed address,indexed address)
          handler: handleRoleGranted
        - event: RoleRevoked(indexed bytes32,indexed address,indexed address)
          handler: handleRoleRevoked
        - event: TenantCreated(indexed bytes32,indexed address,indexed address)
          handler: handleTenantCreated
        - event: TenantStatusUpdated(indexed bytes32,bool)
          handler: handleTenantStatusUpdated
        - event: TreasuryUpdated(indexed bytes32,indexed address,indexed address)
          handler: handleTreasuryUpdated
        - event: UnstakeCooldownUpdated(indexed bytes32,uint256,uint256)
          handler: handleUnstakeCooldownUpdated
        - event: ViolationPenaltyUpdated(indexed bytes32,indexed bytes32,uint16,uint16)
          handler: handleViolationPenaltyUpdated
      file: ./src/voucher-protocol.ts
