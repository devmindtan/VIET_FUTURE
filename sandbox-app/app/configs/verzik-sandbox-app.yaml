apiVersion: apps/v1
kind: Deployment
metadata:
  name: verzik-sandbox-app
  namespace: test
  labels:
    app: verzik-sandbox-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: verzik-sandbox-app
  template:
    metadata:
      labels:
        app: verzik-sandbox-app
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - verzik-sandbox-app
              topologyKey: "kubernetes.io/hostname"
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - master-node
      containers:
        - name: verzik-sandbox-app
          image: devmindtan/dev-repo:verzik-sandbox-app-v1.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: verzik-sandbox-app-service
  namespace: test
spec:
  type: NodePort
  selector:
    app: verzik-sandbox-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
